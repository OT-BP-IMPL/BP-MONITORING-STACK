groups:
  - name: db_alerts
    rules:

      # Dashboard panel ID:10 — MySQL Status | thresholds: 0=red, 1=green
      - alert: MySQLDown
        expr: mysql_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL is DOWN"
          description: "mysql_up == 0. Dashboard panel: MySQL Status shows RED."

      # Dashboard panel ID:12 — Active DB Connections
      # thresholds: green=0, orange=80 (absolute), red=120 (absolute)
      # CHANGED FROM: percentage-based (80% of max_connections)
      # TO: absolute thresholds matching dashboard exactly
      - alert: MySQLConnectionsWarning
        expr: mysql_global_status_threads_connected > 300
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "MySQL active connections above 300 (current: {{ $value | printf \"%.0f\" }})"
          description: "Dashboard panel threshold: orange at 80 connections."

      - alert: MySQLConnectionsCritical
        expr: mysql_global_status_threads_connected > 360
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL active connections above 360 — CRITICAL (current: {{ $value | printf \"%.0f\" }})"
          description: "Dashboard panel threshold: red at 120 connections."

      # TCP probe alert (from buildpiper-container-rules, kept here for DB scope)
      - alert: MySQLTCPDown
        expr: probe_success{job="blackbox-tcp-buildpiper", instance="host.docker.internal:3306"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL TCP port 3306 unreachable on host.docker.internal"
