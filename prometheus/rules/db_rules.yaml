groups:
  - name: db_alerts
    rules:

      - alert: DatabaseDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is DOWN"

      - alert: TooManyConnections
        expr: sum(pg_stat_activity_count) > (pg_settings_max_connections * 0.8)
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "DB connections above 80% of max_connections"

      - alert: SlowQueries
        expr: rate(pg_stat_activity_count{state="active"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of active queries detected"