global:
  smtp_smarthost: 'smtp.office365.com:587'   
  smtp_from: 'ot-buildpiper-impl@opstree.com'           
  smtp_auth_username: 'support@opstree.com'   
  smtp_auth_password: 'October02@2024'      
  smtp_require_tls: true
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email-critical'
  routes:
    - match:
        severity: critical
      receiver: 'email-critical'
    - match:
        severity: warning
      receiver: 'email-warning'

receivers:
  - name: 'email-critical'
    email_configs:
      - to: 'ot-buildpiper-impl@opstree.com'            
        send_resolved: true
        headers:
          Subject: '[CRITICAL][BuildPiper] {{ .CommonLabels.alertname }} - {{ .CommonLabels.env }}'
        html: |
          <h2 style="color:red">🔴 {{ .CommonLabels.alertname }}</h2>
          <b>Severity:</b> {{ .CommonLabels.severity }}<br>
          <b>Environment:</b> {{ .CommonLabels.env }}<br>
          <b>Cluster:</b> {{ .CommonLabels.cluster }}<br>
          <hr>
          {{ range .Alerts }}
          <b>Summary:</b> {{ .Annotations.summary }}<br>
          <b>Description:</b> {{ .Annotations.description }}<br>
          <b>Started:</b> {{ .StartsAt }}<br>
          <hr>
          {{ end }}

  - name: 'email-warning'
    email_configs:
      - to: 'ot-buildpiper-impl@opstree.com'
        send_resolved: true
        headers:
          Subject: '[WARNING][BuildPiper] {{ .CommonLabels.alertname }} - {{ .CommonLabels.env }}'
        html: |
          <h2 style="color:orange">🟡 {{ .CommonLabels.alertname }}</h2>
          <b>Severity:</b> {{ .CommonLabels.severity }}<br>
          <b>Environment:</b> {{ .CommonLabels.env }}<br>
          <hr>
          {{ range .Alerts }}
          <b>Summary:</b> {{ .Annotations.summary }}<br>
          <b>Started:</b> {{ .StartsAt }}<br>
          <hr>
          {{ end }}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'instance']